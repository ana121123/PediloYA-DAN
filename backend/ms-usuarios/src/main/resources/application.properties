spring.application.name=ms-usuarios
server.port=8080
server.servlet.context-path=/usuariosMs

# CONFIGURACIÓN DE LA BASE DE DATOS 
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/usuarios_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACIÓN DE JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# CONFIGURACIÓN JWT
jwt.secret=${JWT_SECRET_KEY}

# CONFIGURACIÓN SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.seminario.ms_usuarios.controller
springdoc.show-actuator=true

# CONFIGURACIÓN DE MICROSERVICIOS EXTERNOS
catalogo.ms.url=${CATALOGO_MS_URL:http://localhost:8081}
pedido.ms.url=${PEDIDO_MS_URL:http://localhost:8082}

# CONFIGURACIÓN DE CIRCUIT BREAKER (Resilience4j)
resilience4j.circuitbreaker.instances.catalogoClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.catalogoClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.catalogoClient.failureRateThreshold=50.0
resilience4j.circuitbreaker.instances.catalogoClient.slowCallRateThreshold=50.0
resilience4j.circuitbreaker.instances.catalogoClient.slowCallDurationThreshold=2000
resilience4j.circuitbreaker.instances.catalogoClient.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.catalogoClient.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.catalogoClient.waitDurationInOpenState=10000

# CONFIGURACIÓN DE REINTENTOS
resilience4j.retry.instances.catalogoClient.maxAttempts=3
resilience4j.retry.instances.catalogoClient.waitDuration=1000
resilience4j.retry.instances.catalogoClient.retryExceptions=java.io.IOException,java.net.SocketTimeoutException,org.springframework.web.client.ResourceAccessException

#CONFIGURACIÓN EUREKA CLIENT
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Microservicio de Usuarios - Proyecto Analistas
info.app.version=0.0.1-SNAPSHOT

#CONFIGURACIÓN PROMETHEUS
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=${spring.application.name}
