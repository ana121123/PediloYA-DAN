# ============================================================================
# CONFIGURACIÓN MS-PEDIDO
# Spring Boot 4.0.2 + Java 21 LTS
# ============================================================================

spring:
  application:
    name: ms-pedido

  # ===== VIRTUAL THREADS (NUEVO EN SPRING BOOT 4) =====
  threads:
    virtual:
      enabled: true

  # ===== BASE DE DATOS POSTGRESQL =====
  datasource:
    url: jdbc:postgresql://localhost:5433/pedidos_db
    username: postgres
    password: ${DB_PASSWORD:admin} # Usa variable de entorno en producción
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      ddl-auto: update # En producción usa 'validate' o Flyway/Liquibase
    show-sql: false # Cambia a false en producción
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ===== MONGODB PARA CARRITO Y NOTIFICACIONES =====
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/pedido-mongo-db}
    auto-index-creation: true

  # ============================================================
  # CONFIGURACIÓN KAFKA PARA MS-PEDIDO
  # ============================================================

  kafka:
    # === Bootstrap Servers (puntos de entrada al cluster) ===
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    
    # === PRODUCER CONFIGURATION ===
    # Define cómo publicar eventos a Kafka
    producer:
      bootstrap-servers: ${spring.kafka.bootstrap-servers}
      
      # Serialización
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      
      # Garantías de entrega (acks=all es más lento pero 100% seguro)
      acks: all                         # Espera confirmación de todos los replicas
      retries: 3                        # Reintenta 3 veces si falla
      
      # Batching: agrupa mensajes para mejor rendimiento
      batch-size: 16384               # 16KB de datos
      linger-ms: 10                   # Espera 10ms para agrupar
      
      # Prevención de duplicados
      enable-idempotence: true         # Garantiza "exactly once"
      
      # Configuración de ordenamiento
      max-in-flight-requests-per-connection: 1  # Mantiene orden de mensajes
      
      properties:
        request.timeout.ms: 30000
        
    # === CONSUMER CONFIGURATION ===
    # Define cómo consumir eventos desde Kafka
    consumer:
      bootstrap-servers: ${spring.kafka.bootstrap-servers}
      
      # Group ID: identifica el consumer group para este microservicio
      # Permite múltiples instancias sin duplicar procesamiento
      group-id: ${spring.application.name:ms-pedido}-consumer-group
      
      # Deserialización
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      
      # Configuración de offset
      auto-offset-reset: earliest      # Si no hay offset, procesar desde el principio
      enable-auto-commit: false        # Commit manual en listeners (para mayor control)
      
      # Batching
      max-poll-records: 100            # Máximo registros a traer en cada poll
      
      # Timeouts
      session-timeout-ms: 30000        # 30 segundos
      max-poll-interval-ms: 300000     # 5 minutos
      
      properties:
        # Apenas procesa datos que ya fueron confirmados (read_committed)
        # Evita leer datos que aún están siendo procesados
        isolation.level: read_committed
        
        # Configuración de ErrorHandlingDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.seminario.*"
        
    # === LISTENER CONFIGURATION ===
    # Define cómo se procesan los eventos en los @KafkaListener
    listener:
      # Procesar mensaje a mensaje (no en lotes)
      type: single
      
      # Tiempo de espera para obtener nuevos mensajes
      poll-timeout: 3000
      
      # ACK mode: MANUAL para mayor control
      # Solo confirma offset después de procesar exitosamente
      ack-mode: MANUAL
      
      # Concurrencia: número de threads que procesan mensajes en paralelo
      concurrency: 3
      
    # === RETRY CONFIGURATION ===
    # Configuración de reintentos en listeners
    retry:
      topic:
        enabled: true                  # Activar retry topic
        max:
          attempts: 3                  # Máximo 3 intentos
        delay:
          ms: 5000                     # Esperar 5 segundos entre intentos
        multiplier: 2.0                # Backoff exponencial: 5s, 10s, 20s
        
    # === SECURITY (si tu cluster Kafka está securizado) ===
    # Descomenta si tu Kafka requiere autenticación
    # security:
    #   protocol: SASL_SSL
    #   sasl:
    #     mechanism: PLAIN
    #     jaas-config: >
    #       org.apache.kafka.common.security.plain.PlainLoginModule required
    #       username="${KAFKA_USERNAME}"
    #       password="${KAFKA_PASSWORD}";


# ============================================================
# VARIABLES DE ENTORNO PARA DOCKER-COMPOSE
# ============================================================
# En docker-compose.yml, sobrescribe estas variables:
#
# environment:
#   KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:29092,kafka-broker-2:29092,kafka-broker-3:29092
#   SPRING_PROFILES_ACTIVE: docker
#
# También puedes crear application-docker.yml con estos valores

# ============================================================
# NOTAS IMPORTANTES
# ============================================================
#
# 1. AMBIENTE LOCAL (dev):
#    - bootstrap-servers: localhost:9092
#    - Usa un solo broker
#    - Consumer group puede compartirse
#
# 2. AMBIENTE DOCKER (producción):
#    - bootstrap-servers: kafka-broker-1:29092,kafka-broker-2:29092,kafka-broker-3:29092
#    - Usa direcciones INTERNAS del contenedor
#    - Cada instancia del microservicio es parte del mismo consumer group
#
# 3. DIRECCIONES DE BOOTSTRAP EN DOCKER:
#    - DENTRO de Docker: kafka-broker-1:29092 (puerto interno)
#    - FUERA de Docker:  localhost:9092 (puerto expuesto)
#    - spring.kafka.bootstrap-servers debe usar direcciones INTERNAS
#
# 4. MONITORING:
#    - Acceder a Kafka UI: http://localhost:8080
#    - Ver topics, particiones, consumer groups
#    - Ver lag de consumidores

  # ===== CACHE CON CAFFEINE =====
  cache:
    type: caffeine
    cache-names: productos, usuarios
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

  web:
    error:
      include-message: always
      include-binding-errors: always
      include-stacktrace: on_param # Solo muestra stacktrace si ?trace=true
      include-exception: false

# ===== SERVIDOR =====
server:
  port: 8082
  servlet:
    context-path: /pedidoMs
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ===== MICROSERVICIOS EXTERNOS =====
usuarios:
  ms:
    url: ${USUARIOS_MS_URL:http://localhost:8080}

catalogo:
  ms:
    url: ${CATALOGO_MS_URL:http://localhost:8081}

# ===== SEGURIDAD JWT =====
jwt:
  secret: ${JWT_SECRET_KEY:c2VjcmV0b19zdXBlcl9segdyb19wYXJhX2Rlc2YXJyb2xsb19lbiVsYWN1bA==}
  # IMPORTANTE: En producción, SIEMPRE usa variable de entorno
  # export JWT_SECRET_KEY="tu_secret_real_super_largo"

# ===== RESILIENCE4J =====
resilience4j:
  # Circuit Breaker para servicios externos
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true

        # Excepciones que cuentan como fallos
        recordExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException

        # Excepciones que NO cuentan como fallos (errores de cliente)
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - org.springframework.web.client.HttpClientErrorException.Unauthorized
          - org.springframework.web.client.HttpClientErrorException.Forbidden
          - org.springframework.web.client.HttpClientErrorException.NotFound
          - com.seminario.ms_pedido.exception.ProductoNoEncontradoException

    instances:
      # Circuit Breaker para MS-Catálogo
      catalogo:
        baseConfig: default

      # Circuit Breaker para MS-Usuarios
      usuarios:
        baseConfig: default

# ===== ACTUATOR & OBSERVABILIDAD =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,loggers
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

    circuitbreakers:
      enabled: true

    circuitbreakerevents:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

    livenessstate:
      enabled: true

    readinessstate:
      enabled: true

    # Health checks para bases de datos
    db:
      enabled: true

    mongodb:
      enabled: true

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  # ===== MÉTRICAS =====
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true

    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}

  prometheus:
    export:
      enabled: true

  # ===== TRACING DISTRIBUIDO HABILITADO =====
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # 100% en dev, 0.1 (10%) en producción

    # Propaga trace context a través de requests HTTP
    propagation:
      type: W3C # W3C Trace Context (estándar)

  # ===== ZIPKIN (OPCIONAL - Para visualizar traces) =====
  # Descomenta si quieres ver los traces en Zipkin
  # Primero inicia Zipkin: docker run -d -p 9411:9411 openzipkin/zipkin
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# ===== SPRINGDOC / SWAGGER =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    show-extensions: true
    oauth:
      use-pkce-with-authorization-code-grant: true

  api-docs:
    path: /api-docs

  packages-to-scan: com.seminario.ms_pedido.controller
  show-actuator: true

# ===== EUREKA / SERVICE DISCOVERY =====
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# ===== LOGGING CON TRACE IDs =====
logging:
  level:
    root: INFO
    com.seminario.ms_pedido: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    io.github.resilience4j: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

    # Kafka client logs (muy verbose)
    org.apache.kafka.clients: WARN
    org.apache.kafka.common: WARN
    
    # Spring Kafka
    org.springframework.kafka: DEBUG       # DEBUG para ver todos los eventos
    
    # Tu aplicación
    com.seminario.ms_pedido.kafka: DEBUG
    com.seminario.ms_pedido.service: DEBUG

  # ✅ PATTERN CON TRACE IDs HABILITADO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

---
# ===== PERFIL DE DESARROLLO =====
spring:
  config:
    activate:
      on-profile: dev

  web:
    error:
      include-stacktrace: always # Muestra stacktrace completo en dev
logging:
  level:
    root: DEBUG
    com.seminario.ms_pedido: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*" # Expone TODOS los endpoints en dev

---
# ===== PERFIL DE PRODUCCIÓN =====
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate # NO modifica la DB en producción

  web:
    error:
      include-stacktrace: never
      include-message: never
logging:
  level:
    root: WARN
    com.seminario.ms_pedido: INFO

  # En producción, logs sin trace IDs (más limpio)
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 0.1 # Solo 10% de traces en producción
